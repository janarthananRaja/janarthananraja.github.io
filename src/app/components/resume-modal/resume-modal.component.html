<div class="resume-modal-container" [ngClass]="sharedService.getStyleMode()">
    <div class="modal-header">
        <h2>Get My Resume</h2>
        <button class="close-btn" mat-dialog-close>
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <div class="modal-body">
        <p class="modal-desc">
            Enter your email and I'll send a fresh copy of my resume directly to your inbox.
        </p>

        <form class="email-form" (ngSubmit)="sendResume()" #resumeForm="ngForm">
            <div class="input-container">
                <input type="email" id="email" name="email" [(ngModel)]="email" required email
                    placeholder="name@example.com" class="premium-input">
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-premium" [disabled]="!resumeForm.form.valid || isLoading">
                    <span *ngIf="!isLoading">Send Now <i class="bi bi-send-fill ms-2"></i></span>
                    <span *ngIf="isLoading" class="premium-loader"></span>
                </button>
            </div>
        </form>

        <div class="status-message" *ngIf="statusMessage" [ngClass]="statusType">
            {{ statusMessage }}
        </div>
    </div>
</div>
