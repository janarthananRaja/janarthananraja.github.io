<div class="project-view-container">
    <div class="project-carousel-wrapper" [ngClass]="animState">
        <div class="glass-project-card" *ngIf="currentProject">
            <div class="project-visual-side">
                <div class="image-overlay"></div>
                <img [src]="currentProject.imageUrl || 'assets/placeholder-project.png'" [alt]="currentProject.name"
                    class="project-main-img">
                <div class="project-badge">{{currentProject.hind || 'Development'}}</div>
            </div>

            <div class="project-info-side">
                <div class="project-header-row">
                    <h3 class="project-title-text">{{currentProject.name}}</h3>
                    <div class="project-index-badge">
                        {{currentIndex + 1}} / {{cardData.length || 0}}
                    </div>
                </div>

                <div class="tech-tag-container">
                    <span class="tech-tag" *ngFor="let tech of currentProject.usedTech">
                        {{tech}}
                    </span>
                </div>

                <p class="project-desc-text">
                    {{currentProject.description}}
                </p>

                <div class="project-actions-row">
                    <button class="btn-premium btn-sm text-nowrap" *ngIf="currentProject.isResume"
                        (click)="openResumeDialog()">
                        Get Resume <i class="bi bi-file-earmark-pdf ms-2"></i>
                    </button>

                    <a class="btn-premium btn-sm text-nowrap" *ngIf="!currentProject.isResume && currentProject.website"
                        [href]="currentProject.website" target="_blank">
                        View Live <i class="bi bi-box-arrow-up-right ms-2"></i>
                    </a>

                    <button class="btn-nav-control" (click)="prevProject()" title="Previous Project">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                    <button class="btn-nav-control" (click)="nextProject()" title="Next Project">
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
