<div class="main-container hide-scrollbar" #home>
  <!-- Modern Header / Nav -->
  <header class="navbar-premium glass-card reveal-section">
    <div class="nav-content w-100">
      <div class="logo">
        <span class="text-gradient">JANA</span>
      </div>
      <nav class="nav-links">
        <a (click)="scrollToSection('home')" class="nav-link">About</a>
        <a (click)="scrollToSection('project')" class="nav-link">Projects</a>
        <a (click)="scrollToSection('skill')" class="nav-link">Skills</a>
        <a (click)="scrollToSection('contact')" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero-section reveal-section active">
    <div class="hero-content">
      <div class="hero-text-area">
        <div class="status-badge glass-card">
          <span class="status-dot"></span>
          Available for new projects
        </div>
        <h1 class="hero-title">
          Crafting Digital <br>
          <span class="text-gradient">Experiences</span> With <br>
          Code & Creativity.
        </h1>
        <p class="hero-description">
          Hi, I'm <span class="highlight">Janarthanan</span>. A Full-Stack Developer specializing in building high-performance 
          web applications with Angular and Spring Boot.
        </p>
        <div class="hero-actions">
          <button class="btn-premium magnetic-item" (click)="openResumeDialog()">
            Get Resume <i class="bi bi-download ms-2"></i>
          </button>
          <div class="hero-socials">
            <a href="mailto:janarthananlyfc@gmail.com" class="social-icon-link magnetic-item"><i class="bi bi-envelope-at"></i></a>
            <a href="https://github.com/janarthananRaja" target="_blank" class="social-icon-link magnetic-item"><i class="bi bi-github"></i></a>
            <a href="https://linkedin.com/in/janarthanan-r-348b41283" target="_blank" class="social-icon-link magnetic-item"><i class="bi bi-linkedin"></i></a>
          </div>
        </div>
      </div>
      
      <div class="hero-visual reveal-section">
        <div class="image-wrapper glass-card">
          <img src="./assets/hero_setup.avif" alt="Janarthanan Portrait" class="profile-img">
        </div>
      </div>
    </div>
  </section>

  <!-- Projects Section -->
  <section class="section-container reveal-section" #project>
    <div class="section-header d-flex justify-content-between align-items-center flex-wrap gap-3">
      <h2 class="section-title mb-0">Selected <span class="text-gradient">Works</span></h2>
      
      <div class="d-flex gap-3 align-items-center">
        <!-- Category Toggle -->
        <div class="glass-card d-flex p-1 rounded-pill" style="border-radius: 50px;">
          <button class="btn btn-sm rounded-pill px-4" 
                  [ngClass]="activeProjectCategory === 'Professional' ? 'btn-premium' : 'btn-transparent text-secondary'"
                  (click)="activeProjectCategory = 'Professional'">
            Professional
          </button>
          <button class="btn btn-sm rounded-pill px-4"
                  [ngClass]="activeProjectCategory === 'Personal' ? 'btn-premium' : 'btn-transparent text-secondary'"
                  (click)="activeProjectCategory = 'Personal'">
            Personal
          </button>
        </div>

        <!-- View Toggle -->
        <button class="layout-toggle-btn" (click)="toggleLayout()">
          <i class="bi" [ngClass]="currentStyle === 'cards' ? 'bi-list' : 'bi-grid'"></i>
          <span class="ms-2 d-none d-md-inline">{{currentStyle === 'cards' ? 'List View' : 'Grid View'}}</span>
        </button>
      </div>
    </div>
    
    <div class="project-view-wrapper mt-4">
      <app-project *ngIf="currentStyle == 'cards'" [category]="activeProjectCategory"></app-project>
      <div *ngIf="currentStyle == 'list'" class="list-view-animate">
        <app-test [category]="activeProjectCategory"></app-test>
      </div>
    </div>
  </section>

  <!-- Skills Section -->
  <section class="section-container reveal-section" #skill>
    <app-skill-set *ngIf="isSkillSection"></app-skill-set>
  </section>

  <!-- Contact Section -->
  <section class="section-container reveal-section" #contact>
    <app-contact></app-contact>
  </section>

  <!-- Animated Theme Toggle (Floating) -->
  <div class="design-side-toggle" (click)="toggleTheme()" [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
    <div class="toggle-icon">
      <i class="bi" [ngClass]="isDarkMode ? 'bi-moon-stars-fill' : 'bi-sun-fill'"></i>
    </div>
  </div>
</div>
